<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ node_id }} - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>{{ node_id }}</h1>
            <div class="ports">
                <span class="port-badge">P2P: {{ p2p_port }}</span>
                <span class="port-badge">Dashboard: {{ dashboard_port }}</span>
            </div>
        </div>

        <!-- Wallet Card -->
        <div class="card">
            <h2>Wallet</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Address:</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span class="value monospace" id="wallet-address">-</span>
                        <button type="button" class="btn-copy" onclick="copyAddress()">Copiar</button>
                    </div>
                </div>
                <div class="info-item">
                    <span class="label">Balance:</span>
                    <span class="value balance" id="wallet-balance">-</span> coins
                </div>
            </div>
        </div>

        <!-- Send TX Card -->
        <div class="card">
            <h2>Enviar Transaccion</h2>
            <form method="POST" action="/send_tx" id="tx-form">
                <div class="form-group">
                    <label for="to_address">Destinatario (address):</label>
                    <input type="text" 
                        name="to_address" 
                        id="to_address" 
                        placeholder="1A2B3C4D5E6F..." 
                        required
                        pattern="^1[A-Za-z0-9]{25,34}$"
                        title="Ingresa una address válida de Bitcoin (empieza con 1)">
                </div>
                <div class="form-group">
                    <label for="amount">Cantidad:</label>
                    <input type="number" name="amount" id="amount" 
                           min="0.01" step="0.01" value="10" required>
                </div>
                <button type="submit" class="btn-primary">Enviar Transaccion</button>
            </form>
        </div>

        <!-- Network Card -->
        <div class="card">
            <h2>Red P2P</h2>
            <div class="info-item">
                <span class="label">Peers conectados:</span>
                <span class="value" id="peers-count">-</span>
            </div>
            <ul id="peers-list" class="peer-list"></ul>
        </div>

        <!-- Mempool Card -->
        <div class="card">
            <h2>Mempool</h2>
            <div class="info-item">
                <span class="label">Transacciones:</span>
                <span class="value" id="mempool-count">-</span>
            </div>
            <div id="mempool-list" class="tx-list"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
